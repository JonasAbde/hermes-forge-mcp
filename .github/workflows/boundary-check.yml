name: Boundary Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-boundaries:
    runs-on: [self-hosted, linux, x64, vps]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check for forbidden database dependencies
        run: |
          if [ -f scripts/check-repo-boundaries.mjs ]; then
            node scripts/check-repo-boundaries.mjs
          else
            echo "⚠️  Boundary checker not found — skipping"
          fi
