name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (smoke + unit + http)
        run: npm test

      - name: Smoke test (stdio contract)
        run: npm run smoke

      - name: Integration tests (tag releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: node tests/test-http.mjs
        env:
          FORGE_PAT: ${{ secrets.FORGE_PAT }}
